# ============================================================================
# BFD (Built-in Focus Direction) Hotkey Configuration
# ============================================================================
#
# All fields are optional - you can comment out any section.
#
# Hotkey format: "modifier+modifier-key"
#   Modifiers: cmd, ctrl, alt, shift (combine with +)
#   Examples: cmd-h, cmd+shift-h, ctrl+alt-j
#
# Hotkey values can be:
#   - "@command" for in-process dispatch (no process spawn)
#   - Shell command string: "open -na /Applications/Ghostty.app"
#   - Extended format with options:
#       run: "@resize cell left 0.01"
#       repeat: false      # Disable key repeat (default: true)
#       rate_limit: 20     # Min ms between repeats (default: 50)
#
# ============================================================================

shell: /bin/zsh

defaults:
  repeat: true
  rate_limit: 50

blacklist:
  - "VMware Fusion"
  - "Parallels Desktop"

hotkeys:
  # Navigation
  cmd-h: "@focus prev -m"
  cmd-l: "@focus next -m"
  cmd+shift-h: "@focus left --extend --mouse"
  cmd+shift-l: "@focus right --extend -m"
  cmd+shift-j: "@focus down --extend -m"
  cmd+shift-k: "@focus up --extend -m"

  # Movement
  cmd+ctrl-h: "@window move left --extend -m"
  cmd+ctrl-l: "@window move right --extend -m"
  cmd+ctrl-j: "@window move down --extend -m"
  cmd+ctrl-k: "@window move up --extend -m"

  # Swap
  ctrl+alt-h: "@window swap left -m"
  ctrl+alt-l: "@window swap right -m"
  ctrl+alt-j: "@window swap down -m"
  ctrl+alt-k: "@window swap up -m"

  # Resize (faster rate for smooth resizing)
  cmd+alt-h:
    run: "@resize cell left 0.01"
    rate_limit: 20
  cmd+alt-l:
    run: "@resize cell right 0.01"
    rate_limit: 20
  cmd+alt-j:
    run: "@resize grow 0.01"
    rate_limit: 20
  cmd+alt-k:
    run: "@resize shrink 0.01"
    rate_limit: 20
  cmd+alt-0: "@resize reset --cells"

  # Layout
  cmd-0: "@layout refresh"
  cmd-1: "@layout apply single-tabs"
  cmd-2: "@layout apply two-column"
  cmd-3: "@layout apply three-column"
  cmd-9: rm /Users/r/.local/state/thegrid/thegrid*
  alt-a: "@layout refresh"
  alt-s: "@cell mode"

  # Apps (no repeat for launchers)
  cmd-return:
    run: open -na /Applications/Ghostty.app
    repeat: false
  cmd-escape:
    run: "@pick"
    repeat: false

  ctrl-backtick:
    run: "@terminal"
    repeat: false

  cmd+shift-escape:
    run: "@test"
    repeat: false

  # Nudge mode
  ctrl+shift-n:
    run: "@nudge enter"
    repeat: false

  # Service control
  alt-escape:
    run: services stop thegrid-dev
    repeat: false

# ============================================================================
# Per-App Hotkey Overrides
# ============================================================================
#
# Override hotkeys for specific applications. Values can be:
#   - "~"           Pass-through to the app (BFD ignores, app receives key)
#   - "command"     Run a different command for this app
#   - Extended format (same as hotkeys section)
#
# Example:
#   apps:
#     Ghostty:
#       cmd-h: ~              # Let Ghostty handle cmd-h natively
#       cmd-l: ~              # Let Ghostty handle cmd-l natively
#     "Some App":
#       cmd-k: "@focus up"    # Different command for this app
#
# ============================================================================

# apps:
#   Ghostty:
#     cmd-h: ~
#     cmd-l: ~
