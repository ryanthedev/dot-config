unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Ensure homebrew binaries are available in run-shell commands
set-environment -g PATH "/opt/homebrew/bin:$PATH"

# Increase scrollback
set -g history-limit 50000

# Auto-renumber windows when one is closed
set -g renumber-windows on

# OSC 52 clipboard passthrough (works over SSH too)
set -g set-clipboard on

unbind r
bind r source-file ~/.config/tmux/tmux.conf

unbind '"'
bind s split-window -v -c "#{pane_current_path}" \; resize-pane -D 10 
bind c new-window -c "#{pane_current_path}"

bind-key -r -T prefix       M-Up              resize-pane -U 1
bind-key -r -T prefix       M-Down            resize-pane -D 1
bind-key -r -T prefix       M-Left            resize-pane -L 1
bind-key -r -T prefix       M-Right           resize-pane -R 1

# Smart pane switching with awareness of Vim splits
# See: https://github.com/christoomey/vim-tmux-navigator

# decide whether we're in a Vim process
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'select-pane -t:.+'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-BSpace' select-pane -l
bind-key -T copy-mode-vi 'C-n' select-pane -t:.+
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection  # Don't exit copy-mode on mouse selection

# Use Vim keys in copy-mode
setw -g mode-keys vi

# Ctrl-y / Ctrl-e scrolling in copy-mode (just like Vim)
bind -T copy-mode-vi C-y send-keys -X scroll-up
bind -T copy-mode-vi C-e send-keys -X scroll-down

# Optional: make y yank to system clipboard (macOS)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Optional: make p paste from system clipboard
bind p run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Quick search in scrollback
bind-key / copy-mode \; send-keys ?

# Enable extended keys support for terminals
set -s extended-keys on
set -as terminal-features 'ghostty:extkeys'



# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# ── Status Bar: Bamboo Multiplex ──────────────────────────────────────
# All colors sourced from bamboo multiplex nvim palette
# Normal: transparent bg, muted greens/greys, golden session accent
# Prefix: full orange bg — split-complementary to green, warm advance
set -g status-position top
set -g status-left-length 40
set -g status-right-length 80
set -g status-style "#{?client_prefix,bg=#ef9946 fg=#171f17 bold,bg=default fg=#818781}"

# Session: golden accent → dark-on-orange when prefix active
set -g status-left "#{?client_prefix,#[fg=#171f17 bold],#[fg=#ceba49 bold]} #S #[nobold]#{?client_prefix,#[fg=#171f17],#[fg=#383d37]}│"

# Window tabs
set -g window-status-format "#{?client_prefix,#[fg=#171f17],#[fg=#5a5e5a]}  #I #W"
set -g window-status-current-format "#{?client_prefix,  #[fg=#171f17 bold] #I #W #[default],  #[fg=#232923 bg=#81af58 bold] #I #W #[default]}"
set -g window-status-separator ""

# Right: git branch + date + time
set -g status-right "#{?client_prefix,#[fg=#171f17],#[fg=#81af58]}#(~/.config/tmux/scripts/status-right.sh)#{?client_prefix,#[fg=#171f17],#[fg=#5a5e5a]} %a %d #{?client_prefix,#[fg=#171f17],#[fg=#383d37]}│ #{?client_prefix,#[fg=#171f17 bold],#[fg=#68baae bold]}%H:%M "

# Borders
set -g pane-border-style "fg=#383d37"
set -g pane-active-border-style "fg=#81af58"

# Messages & modes
set -g message-style "bg=#81af58,fg=#171f17,bold"
set -g message-command-style "bg=#81af58,fg=#171f17"
set -g mode-style "bg=#363b35,fg=#ece1c0"

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_action 'copy-pipe'  # Stay in copy-mode after yanking
set -g mouse on

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @plugin '27medkamal/tmux-session-wizard'
set -g @session-wizard 't'

set -g @plugin 'wfxr/tmux-fzf-url'

# File picker (tmux-file-picker)
bind d detach-client
bind f display-popup -E -w 80% -h 80% "tmux-file-picker -g"
bind F display-popup -E -w 80% -h 80% "tmux-file-picker -g --zoxide"
bind e display-popup -E -w 80% -h 80% "tmux-file-picker -g -d"

# Scrollback in floating nvim (editable/yankable)
bind v run-shell 'tmux capture-pane -epS -3000 > /tmp/tmux-scroll && \
  tmux display-message -p "#{pane_current_command}" > /tmp/tmux-scroll-cmd' \; \
  display-popup -w 99% -h 99% -E ' \
    cmd=$(cat /tmp/tmux-scroll-cmd); \
    case "$cmd" in \
      claude*|[0-9].*) ft=markdown;; \
      python*|python3*) ft=python;; \
      node*) ft=javascript;; \
      ruby*|irb*) ft=ruby;; \
      go*) ft=go;; \
      cargo*|rustc*) ft=rust;; \
      *) ft=bash;; \
    esac; \
    nvim --cmd "let g:scrollback=1" \
      +"set number buftype=nofile filetype=$ft" \
      +"nnoremap <buffer> q :q<CR>" \
      +"BaleiaColorize" +"normal G" \
      /tmp/tmux-scroll'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
run 'PATH=/opt/homebrew/bin:$PATH ~/.config/tmux/plugins/tpm/tpm'
